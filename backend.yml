apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: hamilton
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: samirusername/hamilton-backend:1.0
          ports:
            - containerPort: 8085